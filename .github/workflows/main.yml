name: Testes Automáticos da IA

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4
        
      - name: Configurar o Python na máquina
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Instalar as dependências do projeto
        run: |
          pip install -r requirements.txt
          pip install pytest
          
      - name: Executar o Pytest
        env:
          OPENAI_API_KEY: "sk-fake-key-just-for-github-actions-testing"
        run: pytest test_ai.py
